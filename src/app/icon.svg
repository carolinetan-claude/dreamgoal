<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0D1442"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Goalpost — thick, bold, tri-color -->
  <rect x="72" y="72" width="32" height="368" rx="4" fill="#00BFA6"/>
  <rect x="408" y="72" width="32" height="368" rx="4" fill="#E91E63"/>
  <rect x="72" y="72" width="368" height="32" rx="4" fill="#FFD600"/>

  <!-- Bullseye target -->
  <!-- Outer ring -->
  <circle cx="272" cy="288" r="120" fill="#E91E63"/>
  <circle cx="272" cy="288" r="100" fill="#0D1442"/>
  <!-- Middle ring -->
  <circle cx="272" cy="288" r="80" fill="#FFD600"/>
  <circle cx="272" cy="288" r="60" fill="#0D1442"/>
  <!-- Inner ring -->
  <circle cx="272" cy="288" r="42" fill="#00BFA6"/>
  <circle cx="272" cy="288" r="24" fill="#0D1442"/>
  <!-- Center dot -->
  <circle cx="272" cy="288" r="10" fill="#FFD600"/>
</svg>
