<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Option 3: Minimal goalpost with soccer ball -->
  <defs>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0a0e3a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#grad3)"/>
  <!-- Goalpost — thick and bold -->
  <rect x="80" y="80" width="28" height="352" rx="4" fill="#00BFA6"/>
  <rect x="404" y="80" width="28" height="352" rx="4" fill="#E91E63"/>
  <rect x="80" y="80" width="352" height="28" rx="4" fill="#FFD600"/>
  <!-- Soccer ball in goal -->
  <circle cx="256" cy="280" r="96" fill="#FFD600" opacity="0.08"/>
  <circle cx="256" cy="280" r="96" fill="none" stroke="#FFD600" stroke-width="6"/>
  <!-- Ball pentagon pattern -->
  <polygon points="256,200 288,224 278,264 234,264 224,224" fill="#FFD600" opacity="0.9"/>
  <polygon points="224,224 192,240 192,290 224,306 234,264" fill="none" stroke="#FFD600" stroke-width="3" opacity="0.5"/>
  <polygon points="288,224 320,240 320,290 288,306 278,264" fill="none" stroke="#FFD600" stroke-width="3" opacity="0.5"/>
  <polygon points="234,264 224,306 248,340 264,340 288,306 278,264" fill="none" stroke="#FFD600" stroke-width="3" opacity="0.5"/>
  <polygon points="256,200 224,224 192,200 200,168 256,156 312,168 320,200 288,224" fill="none" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
</svg>
