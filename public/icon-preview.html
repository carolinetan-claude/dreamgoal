<!DOCTYPE html>
<html>
<head>
  <title>FundGoal Icon Preview</title>
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui, sans-serif; margin: 0; padding: 60px; display: flex; flex-direction: column; align-items: center; gap: 48px; }
    h1 { font-size: 1.5rem; color: #FFD600; margin: 0; }
    .preview { display: flex; align-items: end; gap: 32px; }
    .size { text-align: center; }
    .size img { border-radius: 20%; display: block; margin-bottom: 8px; }
    .size span { font-size: 0.7rem; color: #888; }
    .tab-demo { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 8px 16px; border-radius: 8px 8px 0 0; border: 1px solid #333; border-bottom: none; }
    .tab-demo img { border-radius: 4px; }
    .tab-demo span { font-size: 0.75rem; color: #ccc; }
  </style>
</head>
<body>
  <h1>FUNDGOAL — GOALPOST + BULLSEYE</h1>

  <div class="tab-demo">
    <img src="../src/app/icon.svg" width="16" height="16">
    <span>FundGoal — Fund a Dream</span>
  </div>

  <div class="preview">
    <div class="size"><img src="../src/app/icon.svg" width="256" height="256"><span>256px</span></div>
    <div class="size"><img src="../src/app/icon.svg" width="128" height="128"><span>128px</span></div>
    <div class="size"><img src="../src/app/icon.svg" width="64" height="64"><span>64px</span></div>
    <div class="size"><img src="../src/app/icon.svg" width="32" height="32"><span>32px</span></div>
    <div class="size"><img src="../src/app/icon.svg" width="16" height="16"><span>16px</span></div>
  </div>
</body>
</html>
